<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Animal Classifier</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #eef2ff, #e0e7ff); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        
        h2 { color: #1e293b; margin-bottom: 1.5rem; }
        
        .upload-box { border: 2px dashed #c7d2fe; padding: 2rem; border-radius: 16px; cursor: pointer; transition: 0.3s; background: #fafafa; }
        .upload-box:hover { border-color: var(--primary); background: #f5f3ff; }
        
        #image-preview { max-width: 100%; border-radius: 12px; margin-top: 1rem; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 1.5rem; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        #result-box { margin-top: 1.5rem; padding: 1rem; border-radius: 16px; background: #f8fafc; display: none; text-align: left; }
        
        /* Thanh xác suất */
        .progress-container { height: 8px; background: #e2e8f0; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 1s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <h2>🐶 Nhận diện thú cưng</h2>
    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <p style="color: #64748b;">Chọn ảnh để bắt đầu</p>
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="previewImage(this)">
        <img id="image-preview" src="#" alt="Preview">
    </div>

    <button id="predict-btn" onclick="uploadAndPredict()">Phân tích ảnh</button>

    <div id="result-box">
        <div id="prediction-text" style="font-weight: 600; color: #1e293b;"></div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="conf-text" style="font-size: 0.8rem; color: #64748b; margin-top: 4px;"></div>
    </div>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('result-box').style.display = 'none';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function uploadAndPredict() {
        const fileInput = document.getElementById('file-input');
        if (fileInput.files.length === 0) return alert('Vui lòng chọn ảnh!');

        const btn = document.getElementById('predict-btn');
        const resBox = document.getElementById('result-box');
        
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();
            
            resBox.style.display = 'block';
            document.getElementById('prediction-text').innerText = `Kết quả: ${data.result}`;
            document.getElementById('conf-text').innerText = `Độ tin cậy: ${data.confidence}%`;
            document.getElementById('progress-bar').style.width = data.confidence + "%";
        } catch (e) {
            alert("Lỗi server!");
        } finally {
            btn.innerText = "Phân tích ảnh";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
